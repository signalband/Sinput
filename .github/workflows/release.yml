name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install dependencies
        run: pnpm install

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Sinput ${{ github.ref_name }}'
          releaseBody: |
            Download the desktop app for your platform below.

            **Phone:** Open [sinput.jowork.work](https://sinput.jowork.work) on your phone browser.

            ### macOS
            If you see "Sinput is damaged and can't be opened", run in Terminal:
            ```
            xattr -cr /Applications/Sinput.app
            ```

            ---

            下载对应平台的桌面端应用。

            **手机端：** 用手机浏览器打开 [sinput.jowork.work](https://sinput.jowork.work)。

            ### macOS
            如果提示"已损坏，无法打开"，在终端执行：
            ```
            xattr -cr /Applications/Sinput.app
            ```
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
