name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            Download the desktop app for your platform below.

            **Phone:** Open [sinput.jowork.work](https://sinput.jowork.work) on your phone browser.

            ### macOS
            After installing, if macOS blocks the app:
            1. Open **System Settings → Privacy & Security**
            2. Scroll down — you'll see a message about Sinput being blocked
            3. Click **"Open Anyway"**

            ### Windows
            Run the `.exe` installer or install via `.msi`.

            ---

            下载对应平台的桌面端应用。

            **手机端：** 用手机浏览器打开 [sinput.jowork.work](https://sinput.jowork.work)。

            ### macOS
            安装后如果 macOS 阻止打开：
            1. 打开 **系统设置 → 隐私与安全性**
            2. 向下滚动，会看到 Sinput 被阻止的提示
            3. 点击 **"仍要打开"**

            ### Windows
            运行 `.exe` 安装包或使用 `.msi` 安装。
          draft: false
          prerelease: false

  build-macos:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install dependencies
        run: pnpm install

      - name: Build .app only
        run: cd desktop && pnpm tauri build --target ${{ matrix.target }} --bundles app

      - name: Re-sign app (strip Tauri signature, clean ad-hoc without hardened runtime)
        run: |
          APP=$(find desktop/src-tauri/target -name "Sinput.app" -path "*/bundle/macos/*" | head -1)
          echo "Re-signing: $APP"
          # Strip Tauri's signature (may include hardened runtime flags that cause "damaged")
          codesign --remove-signature "$APP"
          # Re-sign ad-hoc: allows execution on Apple Silicon, Gatekeeper shows "cannot verify" (not "damaged")
          codesign --force --deep --sign - "$APP"
          codesign -vv "$APP" 2>&1 || true

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create DMG (with Applications symlink for drag-to-install)
        run: |
          APP=$(find desktop/src-tauri/target -name "Sinput.app" -path "*/bundle/macos/*" | head -1)
          DMG_NAME="Sinput_${{ steps.version.outputs.version }}_${{ matrix.arch }}.dmg"
          STAGING=$(mktemp -d)
          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "Sinput" -srcfolder "$STAGING" -ov -format UDZO "$DMG_NAME"
          rm -rf "$STAGING"

      - name: Create tar.gz
        run: |
          APP_DIR=$(find desktop/src-tauri/target -name "Sinput.app" -path "*/bundle/macos/*" -exec dirname {} \; | head -1)
          tar -czf "Sinput_${{ matrix.arch }}.app.tar.gz" -C "$APP_DIR" Sinput.app

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Sinput_${{ steps.version.outputs.version }}_${{ matrix.arch }}.dmg
            Sinput_${{ matrix.arch }}.app.tar.gz

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install dependencies
        run: pnpm install

      - name: Build desktop app
        run: cd desktop && pnpm tauri build --target x86_64-pc-windows-msvc

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
