<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sinput</title>
  <script type="module" src="/src/main.ts" defer></script>
  <style>
    :root {
      --green: #22C55E;
      --green-aa: #16A34A;
      --red: #EF4444;
      --amber: #F59E0B;
      --bg: #0A0A0A;
      --surface: #171717;
      --text: #FAFAFA;
      --text2: #A3A3A3;
      --border: #262626;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: transparent;
      font-family: 'Geist', -apple-system, system-ui, sans-serif;
      color: var(--text);
      user-select: none;
      -webkit-user-select: none;
    }

    .popover {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin: 8px;
      padding: 20px;
      min-height: calc(100vh - 16px);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title {
      font-size: 14px;
      font-weight: 600;
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 16px;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .close-btn:hover { color: var(--text); }

    /* States */
    .state { display: none; flex-direction: column; align-items: center; gap: 12px; }
    .state.active { display: flex; }

    /* QR / Pairing state */
    #qrContainer {
      width: 180px;
      height: 180px;
      background: #fff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    #qrContainer canvas, #qrContainer img {
      width: 100% !important;
      height: 100% !important;
    }

    .pair-hint {
      font-size: 12px;
      color: var(--text2);
      text-align: center;
      line-height: 1.5;
    }

    .pair-url {
      font-size: 10px;
      color: var(--text2);
      background: var(--bg);
      padding: 6px 10px;
      border-radius: 6px;
      font-family: monospace;
      word-break: break-all;
      text-align: center;
    }

    /* Connected state */
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-dot.online { background: var(--green); animation: pulse 2s ease-in-out infinite; }
    .status-dot.offline { background: var(--red); }
    .status-dot.waiting { background: var(--amber); animation: pulse 1s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .last-msg-label {
      font-size: 10px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .last-msg {
      font-size: 12px;
      color: var(--text2);
      background: var(--bg);
      padding: 10px 12px;
      border-radius: 8px;
      line-height: 1.5;
      max-height: 80px;
      overflow: hidden;
      width: 100%;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      transition: all 0.15s;
    }
    .btn:hover { color: var(--text); border-color: var(--text2); }

    .inject-flash {
      position: fixed;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--green);
      color: #fff;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .inject-flash.show { opacity: 1; }

    /* Loading */
    .loading {
      color: var(--text2);
      font-size: 13px;
      text-align: center;
    }

    .spacer { flex: 1; }

    .footer {
      font-size: 10px;
      color: var(--text2);
      text-align: center;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="popover">
    <div class="header">
      <span class="title">Sinput</span>
      <button class="close-btn" id="closeBtn">&times;</button>
    </div>

    <!-- Loading state -->
    <div class="state active" id="stateLoading">
      <div class="loading">正在生成配对码...</div>
    </div>

    <!-- Pairing state -->
    <div class="state" id="statePairing">
      <div id="qrContainer"></div>
      <div class="pair-hint">手机扫码即连接<br>无需登录或注册</div>
      <div class="pair-url" id="pairUrl"></div>
    </div>

    <!-- Connected state -->
    <div class="state" id="stateConnected">
      <div class="status-row">
        <div class="status-dot" id="phoneDot"></div>
        <span id="phoneStatus">等待手机连接...</span>
      </div>
      <div class="last-msg-label">最近接收</div>
      <div class="last-msg" id="lastMsg">暂无</div>
      <div class="actions">
        <button class="btn" id="repairBtn">重新配对</button>
      </div>
    </div>

    <div class="spacer"></div>
    <div class="footer">Sinput v0.1.0</div>
  </div>

  <div class="inject-flash" id="injectFlash">✓ 已注入</div>
</body>
</html>
