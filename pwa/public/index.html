<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0A0A">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>Sinput</title>
<style>
  :root {
    --green: #22C55E;
    --green-aa: #16A34A;
    --red: #EF4444;
    --amber: #F59E0B;
  }
  [data-theme="dark"] {
    --bg: #0A0A0A;
    --surface: #171717;
    --text: #FAFAFA;
    --text2: #A3A3A3;
    --border: #262626;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html { height: 100%; overflow: hidden; }

  body {
    height: 100%;
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    touch-action: manipulation;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 8px 16px;
    padding-top: env(safe-area-inset-top, 8px);
  }

  /* Status bar */
  .status {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 6px 0;
    font-size: 13px;
    font-weight: 500;
    flex-shrink: 0;
  }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .status-dot.connected { background: var(--green); animation: pulse 2s ease-in-out infinite; }
  .status-dot.disconnected { background: var(--red); }
  .status-dot.connecting { background: var(--amber); animation: pulse 1s ease-in-out infinite; }

  .status-text.connected { color: var(--green); }
  .status-text.disconnected { color: var(--red); }
  .status-text.connecting { color: var(--amber); }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.9); }
  }

  /* Ack */
  .ack {
    text-align: center; font-size: 13px; color: var(--green);
    height: 20px; opacity: 0; transition: opacity 0.2s; flex-shrink: 0;
  }
  .ack.visible { opacity: 1; }

  /* Textarea — compact, auto-grow */
  .input-area {
    flex: 1; min-height: 0; margin: 4px 0;
    overflow-y: auto;
  }

  #textInput {
    width: 100%;
    min-height: 80px;
    max-height: 40vh;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    resize: none;
    outline: none;
    -webkit-appearance: none;
    overflow-y: hidden;
  }
  #textInput:focus { border-color: var(--green); }
  #textInput::placeholder { color: var(--text2); }

  /* Send button — large, sticky at bottom */
  .bottom-bar {
    flex-shrink: 0;
    padding: 8px 0;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
  }

  #sendBtn {
    width: 100%;
    padding: 16px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-family: system-ui;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    min-height: 56px;
  }
  #sendBtn:active { background: var(--green-aa); }
  #sendBtn:disabled { opacity: 0.4; }

  /* A2HS guide — smart per-browser */
  .a2hs-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 20;
    background: rgba(0,0,0,0.85);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 32px;
    text-align: center;
  }
  .a2hs-overlay.show { display: flex; }
  .a2hs-title { font-size: 20px; font-weight: 600; }
  .a2hs-steps { font-size: 14px; color: var(--text2); line-height: 2; text-align: left; }
  .a2hs-steps b { color: var(--text); }
  .a2hs-btn {
    padding: 12px 32px; border-radius: 10px; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer;
    background: var(--green); color: #fff;
  }
  .a2hs-later {
    font-size: 13px; color: var(--text2); background: none;
    border: none; cursor: pointer; text-decoration: underline;
  }

  /* Error overlay */
  .error-overlay {
    display: none; position: fixed; inset: 0; background: var(--bg); z-index: 10;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; padding: 32px;
  }
  .error-overlay.show { display: flex; }
  .error-title { font-size: 18px; font-weight: 600; }
  .error-msg { font-size: 14px; color: var(--text2); text-align: center; }
  .error-retry {
    padding: 12px 24px; background: var(--green); color: #fff;
    border: none; border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer;
  }
</style>
</head>
<body>
  <div class="app">
    <div class="status" aria-live="polite">
      <div class="status-dot connecting" id="statusDot"></div>
      <span class="status-text connecting" id="statusText">连接中...</span>
    </div>

    <div class="ack" id="ack" role="status"></div>

    <div class="input-area">
      <textarea id="textInput" placeholder="拿起手机，说..." inputmode="text" enterkeyhint="send"></textarea>
    </div>

    <div class="bottom-bar">
      <button id="sendBtn" disabled>发送</button>
      <button id="unpairBtn" style="display:none;background:none;border:none;color:#98989D;font-size:12px;padding:8px;cursor:pointer;width:100%;text-align:center">断开配对</button>
    </div>
  </div>

  <!-- A2HS guide overlay -->
  <div class="a2hs-overlay" id="a2hsOverlay">
    <div class="a2hs-title">添加到主屏幕</div>
    <div class="a2hs-steps" id="a2hsSteps"></div>
    <button class="a2hs-btn" id="a2hsOk">我知道了</button>
    <button class="a2hs-later" id="a2hsLater">以后再说</button>
  </div>

  <div class="error-overlay" id="errorOverlay">
    <div class="error-title" id="errorTitle">连接失败</div>
    <div class="error-msg" id="errorMsg"></div>
    <button class="error-retry" onclick="retryConnection()">重试</button>
  </div>

<script>
const API_BASE = location.hostname === "localhost"
  ? "ws://localhost:8787"
  : "wss://ws.sinput.jowork.work";

let ws = null;
let desktopOnline = false;
let isFirstSend = !localStorage.getItem("sinput_first_send_done");
let heartbeatTimer = null;
let reconnectTimer = null;
let reconnectAttempt = 0;

const params = new URLSearchParams(location.search);
let roomId = params.get("room");
let pairSecret = params.get("secret");
const deviceId = localStorage.getItem("sinput_device_id") || crypto.randomUUID();
localStorage.setItem("sinput_device_id", deviceId);

if (roomId && pairSecret) {
  localStorage.setItem("sinput_room_id", roomId);
  localStorage.setItem("sinput_pair_secret", pairSecret);
} else {
  roomId = localStorage.getItem("sinput_room_id");
  pairSecret = localStorage.getItem("sinput_pair_secret");
}

const statusDot = document.getElementById("statusDot");
const statusText = document.getElementById("statusText");
const ackEl = document.getElementById("ack");
const textInput = document.getElementById("textInput");
const sendBtn = document.getElementById("sendBtn");

if (!roomId || !pairSecret) {
  showError("未配对", "请从电脑端扫码配对");
}

// --- WebSocket ---
function cleanup() {
  stopHeartbeat();
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  if (ws) {
    ws.onopen = ws.onmessage = ws.onclose = ws.onerror = null;
    if (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING) {
      ws.close();
    }
    ws = null;
  }
}

function connect() {
  // Prevent duplicate connections
  if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;

  // Clean up any stale state
  cleanup();
  setStatus("connecting", "连接中...");

  const socket = new WebSocket(API_BASE + `/api/room/${roomId}/ws`);
  ws = socket;

  socket.onopen = () => {
    if (ws !== socket) return; // Stale socket
    socket.send(JSON.stringify({ type: "auth", pairSecret, deviceId, role: "phone" }));
    reconnectAttempt = 0;
    startHeartbeat();
  };

  socket.onmessage = (e) => {
    if (ws !== socket) return;
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    switch (msg.type) {
      case "status":
        desktopOnline = msg.desktopOnline;
        if (desktopOnline) {
          setStatus("connected", "已连接到电脑");
          sendBtn.disabled = false;
          document.getElementById("unpairBtn").style.display = "block";
          showA2HSGuide();
        } else {
          setStatus("disconnected", "等待电脑连接");
          sendBtn.disabled = true;
          document.getElementById("unpairBtn").style.display = "block"; // still show unpair when waiting
        }
        break;
      case "ack":
        showAck();
        break;
      case "error":
        if (["AUTH_FAILED","TOKEN_EXPIRED","TOKEN_CONSUMED","ROOM_DESTROYED"].includes(msg.code)) {
          localStorage.removeItem("sinput_room_id");
          localStorage.removeItem("sinput_pair_secret");
          roomId = null;
          pairSecret = null;
          showError("配对已失效", "请从电脑端重新扫码配对");
        }
        break;
    }
  };

  socket.onclose = (e) => {
    if (ws !== socket) return;
    ws = null;
    stopHeartbeat();
    if (e.code >= 4001 && e.code <= 4006) return; // Auth failure or room destroyed, don't reconnect
    sendBtn.disabled = true;
    scheduleReconnect();
  };

  socket.onerror = () => {}; // onclose handles it
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  const delay = Math.min(2000 * Math.pow(1.5, reconnectAttempt), 15000);
  reconnectAttempt++;
  setStatus("connecting", "重新连接中...");
  reconnectTimer = setTimeout(() => { reconnectTimer = null; connect(); }, delay);
}

function startHeartbeat() {
  stopHeartbeat();
  heartbeatTimer = setInterval(() => {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "ping" }));
  }, 30000);
}
function stopHeartbeat() {
  if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; }
}

// --- Send ---
function send() {
  const text = textInput.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN || !desktopOnline) return;
  ws.send(JSON.stringify({ type: "text", text, ts: Date.now() }));
  textInput.value = "";
  textInput.style.height = 'auto';
  textInput.focus();
}

sendBtn.addEventListener("click", send);

// Unpair button
document.getElementById("unpairBtn").addEventListener("click", () => {
  cleanup();
  localStorage.removeItem("sinput_room_id");
  localStorage.removeItem("sinput_pair_secret");
  roomId = null;
  pairSecret = null;
  desktopOnline = false;
  sendBtn.disabled = true;
  document.getElementById("unpairBtn").style.display = "none";
  showError("未配对", "请从电脑端扫码配对");
});
textInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

// Auto-grow
textInput.addEventListener("input", () => {
  textInput.style.height = 'auto';
  textInput.style.height = Math.min(textInput.scrollHeight, window.innerHeight * 0.4) + 'px';
});

// --- UI ---
function setStatus(state, text) {
  statusDot.className = "status-dot " + state;
  statusText.className = "status-text " + state;
  statusText.textContent = text;
}

function showAck() {
  if (isFirstSend) {
    ackEl.textContent = "✨ 已到达电脑光标";
    isFirstSend = false;
    localStorage.setItem("sinput_first_send_done", "1");
  } else {
    ackEl.textContent = "✓";
  }
  ackEl.classList.add("visible");
  setTimeout(() => ackEl.classList.remove("visible"), 800);
}

function showError(title, msg) {
  document.getElementById("errorTitle").textContent = title;
  document.getElementById("errorMsg").textContent = msg;
  document.getElementById("errorOverlay").classList.add("show");
}
function retryConnection() {
  document.getElementById("errorOverlay").classList.remove("show");
  if (!roomId || !pairSecret) return; // nothing to retry
  reconnectAttempt = 0;
  connect();
}

// --- A2HS guide — detect browser and show appropriate steps ---
function showA2HSGuide() {
  if (localStorage.getItem("sinput_a2hs_dismissed")) return;
  if (window.matchMedia("(display-mode: standalone)").matches || navigator.standalone) return;

  const ua = navigator.userAgent;
  let steps = "";

  const isWeChat = /MicroMessenger/i.test(ua);
  const isAlipay = /AlipayClient/i.test(ua);
  const isIOS = /iPhone|iPad/i.test(ua);
  const isSafari = isIOS && /Safari/i.test(ua) && !/CriOS|FxiOS/.test(ua) && !isWeChat && !isAlipay;
  const isChromeIOS = /CriOS/i.test(ua);
  const isAndroid = /Android/i.test(ua);

  if (isWeChat || isAlipay) {
    const appName = isWeChat ? "微信" : "支付宝";
    steps = `
      <b>当前在${appName}内，无法直接添加</b><br><br>
      <b>1.</b> 点击右上角 <b>⋯</b><br>
      <b>2.</b> 选择 <b>「在Safari中打开」</b>或<b>「在浏览器打开」</b><br>
      <b>3.</b> 在 Safari 中点击底部 <b>分享 ↑</b><br>
      <b>4.</b> 选择 <b>「添加到主屏幕」</b><br>
      <br><span style="color:var(--text2);font-size:12px">从主屏幕打开后将以独立 App 形式运行，无浏览器地址栏</span>
    `;
  } else if (isSafari) {
    steps = `
      <b>1.</b> 点击底部 <b>分享</b>按钮 <b>↑</b><br>
      <b>2.</b> 向下滑动，选择 <b>「添加到主屏幕」</b><br>
      <br><span style="color:var(--text2);font-size:12px">添加后将以独立 App 形式运行，无浏览器地址栏</span>
    `;
  } else if (isChromeIOS) {
    steps = `
      <b>1.</b> 点击右下角 <b>分享</b>按钮<br>
      <b>2.</b> 选择 <b>「添加到主屏幕」</b><br>
      <br><span style="color:var(--text2);font-size:12px">添加后将以独立 App 形式运行</span>
    `;
  } else if (isAndroid) {
    steps = `
      <b>1.</b> 点击右上角 <b>⋮</b> 菜单<br>
      <b>2.</b> 选择 <b>「添加到主屏幕」</b>或<b>「安装应用」</b><br>
      <br><span style="color:var(--text2);font-size:12px">安装后将以独立 App 形式运行</span>
    `;
  } else {
    steps = `
      <b>1.</b> 用手机 Safari 或 Chrome 打开此页面<br>
      <b>2.</b> 使用浏览器的「添加到主屏幕」功能<br>
      <br><span style="color:var(--text2);font-size:12px">添加后将以独立 App 形式运行，无浏览器地址栏</span>
    `;
  }

  document.getElementById("a2hsSteps").innerHTML = steps;
  document.getElementById("a2hsOverlay").classList.add("show");
}

document.getElementById("a2hsOk").addEventListener("click", () => {
  document.getElementById("a2hsOverlay").classList.remove("show");
  localStorage.setItem("sinput_a2hs_dismissed", "1");
});
document.getElementById("a2hsLater").addEventListener("click", () => {
  document.getElementById("a2hsOverlay").classList.remove("show");
  // Don't persist — will show again next time
});

// --- Reconnect on visibility change ---
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && roomId && pairSecret) {
    // Only reconnect if truly disconnected, not if already connecting
    if (!ws || ws.readyState === WebSocket.CLOSED) {
      reconnectAttempt = 0;
      connect();
    }
  }
});

// --- Keyboard handling: resize app to visual viewport ---
if (window.visualViewport) {
  const app = document.querySelector(".app");
  function onViewportResize() {
    app.style.height = window.visualViewport.height + "px";
  }
  window.visualViewport.addEventListener("resize", onViewportResize);
  window.visualViewport.addEventListener("scroll", onViewportResize);
  onViewportResize();
}

// --- Service Worker (required for Android PWA standalone mode) ---
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js").catch(() => {});
}

// --- Init ---
if (roomId && pairSecret) {
  connect();
  setTimeout(() => textInput.focus(), 500);
}
</script>
</body>
</html>
