<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0A0A">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon-v2.png">
<title>Sinput</title>
<style>
  :root {
    --green: #22C55E;
    --green-aa: #16A34A;
    --red: #EF4444;
    --amber: #F59E0B;
  }
  [data-theme="dark"] {
    --bg: #0A0A0A;
    --surface: #171717;
    --text: #FAFAFA;
    --text2: #A3A3A3;
    --border: #262626;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; overflow: hidden; }
  body {
    height: 100%;
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    touch-action: manipulation;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 12px 20px;
    padding-top: calc(env(safe-area-inset-top, 12px) + 4px);
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }

  /* --- Status bar: dot + label, left-aligned --- */
  .status-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 0;
    position: relative;
    min-height: 44px;
  }
  .status-dot-btn {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    background: none; border: none; cursor: pointer;
    margin: -6px; padding: 0;
  }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0;
    transition: background 0.3s ease-out, box-shadow 0.3s ease-out;
  }
  .status-dot.connected { background: var(--green); box-shadow: 0 0 8px rgba(34, 197, 94, 0.6); animation: pulse 2s ease-in-out infinite; }
  .status-dot.disconnected { background: var(--red); }
  .status-dot.connecting { background: var(--amber); animation: pulse 1s ease-in-out infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.9); }
  }

  .status-label {
    font-size: 13px; font-weight: 500;
    display: none;
  }
  .status-label.disconnected { display: inline; color: var(--red); }
  .status-label.connecting { display: inline; color: var(--amber); }
  .status-label.connected { display: inline; color: var(--text2); }

  /* --- Status popover (click dot) --- */
  .status-popover {
    display: none;
    position: absolute; top: 48px; left: 0; z-index: 15;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 20px;
    min-width: 200px;
  }
  .status-popover.show { display: block; }
  .status-popover-title {
    font-size: 13px; color: var(--text2); margin-bottom: 12px;
  }
  .status-popover-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; margin-right: 8px; vertical-align: middle;
  }
  .status-popover-dot.on { background: var(--green); }
  .status-popover-dot.off { background: var(--red); }
  .btn-unpair {
    display: block; width: 100%; margin-top: 16px;
    padding: 12px; border-radius: 10px; border: none;
    background: transparent; color: var(--text2);
    font-size: 13px; cursor: pointer; text-align: center;
    min-height: 48px; transition: color 0.15s, background 0.15s;
  }
  .btn-unpair:active { background: rgba(255,255,255,0.05); }
  .btn-unpair.confirm { color: var(--red); font-weight: 600; }
  .popover-backdrop {
    display: none; position: fixed; inset: 0; z-index: 14;
  }
  .popover-backdrop.show { display: block; }

  /* --- Textarea --- */
  .input-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    margin: 12px 0;
  }

  #textInput {
    width: 100%;
    flex: 1;
    min-height: 120px;
    padding: 16px 18px;
    background: var(--surface);
    border: 1.5px solid transparent;
    border-radius: 16px;
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    resize: none;
    outline: none;
    -webkit-appearance: none;
    overflow-y: auto;
    transition: border-color 0.2s ease-out, box-shadow 0.2s ease-out;
  }
  #textInput:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1), 0 0 20px rgba(34, 197, 94, 0.06);
  }
  #textInput::placeholder { color: var(--text2); }

  /* --- Send button --- */
  .bottom-bar {
    flex-shrink: 0;
    padding: 12px 0;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }

  #sendBtn {
    width: 100%;
    padding: 16px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 16px;
    font-family: system-ui;
    font-size: 17px;
    font-weight: 500;
    cursor: pointer;
    min-height: 56px;
    transition: background 0.15s, transform 0.1s;
  }
  #sendBtn:active { background: var(--green-aa); transform: scale(0.98); }
  #sendBtn:disabled {
    background: var(--surface);
    color: var(--text2);
    cursor: default;
  }
  #sendBtn:disabled:active { transform: none; }

  /* Send button ack state */
  #sendBtn.ack {
    background: var(--green-aa);
    animation: ack-pop 0.3s ease-out;
  }
  @keyframes ack-pop {
    0% { transform: scale(1); }
    40% { transform: scale(0.96); }
    100% { transform: scale(1); }
  }

  /* --- A2HS guide --- */
  .a2hs-overlay {
    display: flex;
    position: fixed; inset: 0; z-index: 20;
    background: rgba(0,0,0,0.85);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 32px;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease-out;
  }
  .a2hs-overlay.show { opacity: 1; pointer-events: auto; }
  .a2hs-title { font-size: 20px; font-weight: 600; }
  .a2hs-steps { font-size: 14px; color: var(--text2); line-height: 2; text-align: left; }
  .a2hs-steps b { color: var(--text); }
  .a2hs-btn {
    padding: 12px 32px; border-radius: 16px; border: none;
    font-size: 15px; font-weight: 500; cursor: pointer;
    background: var(--green); color: #fff; min-height: 48px;
  }
  .a2hs-later {
    font-size: 13px; color: var(--text2); background: none;
    border: none; cursor: pointer; text-decoration: underline;
    padding: 12px; min-height: 48px;
  }

  /* --- Pair overlay --- */
  .pair-overlay {
    display: flex; position: fixed; inset: 0; background: var(--bg); z-index: 10;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; padding: 32px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease-out;
  }
  .pair-overlay.show { opacity: 1; pointer-events: auto; }
  .pair-code-input {
    font-size: 32px; text-align: center; letter-spacing: 8px;
    width: 220px; padding: 14px 12px;
    border: 1.5px solid var(--border); border-radius: 16px;
    background: var(--surface); color: var(--text);
    outline: none; font-variant-numeric: tabular-nums;
    transition: border-color 0.2s ease-out, box-shadow 0.2s ease-out;
  }
  .pair-code-input::placeholder { color: var(--text2); letter-spacing: 8px; }
  .pair-code-input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
  }
  .pair-code-error {
    color: var(--red); font-size: 13px; min-height: 20px; text-align: center;
  }
  .pair-submit {
    padding: 14px 48px; background: var(--green); color: #fff; border: none;
    border-radius: 16px; font-size: 16px; font-weight: 500;
    cursor: pointer; min-width: 220px; min-height: 48px;
    transition: background 0.15s, transform 0.1s;
  }
  .pair-submit:active { background: var(--green-aa); transform: scale(0.98); }
  .pair-title { font-size: 18px; font-weight: 500; }
  .pair-msg { font-size: 14px; color: var(--text2); text-align: center; }

  /* --- Error overlay --- */
  .error-overlay {
    display: flex; position: fixed; inset: 0; background: var(--bg); z-index: 10;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; padding: 32px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease-out;
  }
  .error-overlay.show { opacity: 1; pointer-events: auto; }
  .error-title { font-size: 18px; font-weight: 500; color: var(--red); }
  .error-msg { font-size: 14px; color: var(--text2); text-align: center; }
  .error-retry {
    padding: 14px 24px; background: var(--green); color: #fff;
    border: none; border-radius: 16px; font-size: 14px; font-weight: 500;
    cursor: pointer; min-height: 48px;
  }
</style>
</head>
<body>
  <div class="app">
    <!-- Status bar: dot + label -->
    <div class="status-bar">
      <button class="status-dot-btn" id="statusDotBtn"
              role="button" tabindex="0"
              aria-label="连接状态：连接中">
        <div class="status-dot connecting" id="statusDot"></div>
      </button>
      <span class="status-label connecting" id="statusLabel">连接中...</span>

      <!-- Popover: shown on dot click -->
      <div class="status-popover" id="statusPopover">
        <div class="status-popover-title">
          <span class="status-popover-dot on" id="popoverDot"></span>
          <span id="popoverText">已连接到电脑</span>
        </div>
        <button class="btn-unpair" id="unpairBtn">断开配对</button>
      </div>
    </div>
    <div class="popover-backdrop" id="popoverBackdrop"></div>

    <div class="input-area">
      <textarea id="textInput" placeholder="说点什么..." inputmode="text" enterkeyhint="send"></textarea>
    </div>

    <div class="bottom-bar">
      <button id="sendBtn" disabled aria-live="polite">发送</button>
    </div>
  </div>

  <!-- A2HS guide overlay -->
  <div class="a2hs-overlay" id="a2hsOverlay">
    <div class="a2hs-title">添加到主屏幕</div>
    <div class="a2hs-steps" id="a2hsSteps"></div>
    <button class="a2hs-btn" id="a2hsOk">我知道了</button>
    <button class="a2hs-later" id="a2hsLater">以后再说</button>
  </div>

  <!-- Pair code input overlay -->
  <div class="pair-overlay" id="pairOverlay">
    <div class="pair-title">连接到电脑</div>
    <div class="pair-msg">输入电脑端显示的 6 位配对码</div>
    <input id="codeInput" class="pair-code-input" type="tel" maxlength="6"
      pattern="[0-9]*" inputmode="numeric" placeholder="000000">
    <div id="codeError" class="pair-code-error"></div>
    <button id="codeSubmit" class="pair-submit">配对</button>
    <div id="pairReconnectHint" style="display:none;margin-top:12px;font-size:12px;color:var(--text2);text-align:center">
      电脑未在线，输入新配对码即可重新连接
    </div>
  </div>

  <!-- Error / reconnect-failed overlay -->
  <div class="error-overlay" id="errorOverlay">
    <div class="error-title" id="errorTitle">连接失败</div>
    <div class="error-msg" id="errorMsg"></div>
    <button class="error-retry" id="errorRetryBtn">重试</button>
  </div>

<script>
// --- Constants ---
const MAX_RECONNECT = 5;
const API_BASE = location.hostname === "localhost"
  ? "ws://localhost:8787"
  : "wss://ws.sinput.jowork.work";
const HTTP_BASE = location.hostname === "localhost"
  ? "http://localhost:8787"
  : "https://ws.sinput.jowork.work";

// --- State Machine ---
let appState = "unpaired";
let ws = null;
let desktopOnline = false;
let isFirstSend = !localStorage.getItem("sinput_first_send_done");
let heartbeatTimer = null;
let reconnectTimer = null;
let reconnectAttempt = 0;
let unpairConfirmTimer = null;

const params = new URLSearchParams(location.search);
let roomId = params.get("room");
let pairSecret = params.get("secret");
const deviceId = localStorage.getItem("sinput_device_id") || crypto.randomUUID();
localStorage.setItem("sinput_device_id", deviceId);

if (roomId && pairSecret) {
  localStorage.setItem("sinput_room_id", roomId);
  localStorage.setItem("sinput_pair_secret", pairSecret);
} else {
  roomId = localStorage.getItem("sinput_room_id");
  pairSecret = localStorage.getItem("sinput_pair_secret");
}

// --- Elements ---
const statusDot = document.getElementById("statusDot");
const statusLabel = document.getElementById("statusLabel");
const statusPopover = document.getElementById("statusPopover");
const popoverBackdrop = document.getElementById("popoverBackdrop");
const popoverDot = document.getElementById("popoverDot");
const popoverText = document.getElementById("popoverText");
const textInput = document.getElementById("textInput");
const sendBtn = document.getElementById("sendBtn");
const unpairBtn = document.getElementById("unpairBtn");
const pairOverlay = document.getElementById("pairOverlay");
const errorOverlay = document.getElementById("errorOverlay");

// --- Render ---

function render() {
  // Two visual states: connected (show input) or not (show pairing)
  if (appState === "paired-connected") {
    // --- Connected: show input, hide pair overlay ---
    setStatusUI("connected", "");
    sendBtn.disabled = false;
    hidePairOverlay();
    errorOverlay.classList.remove("show");
  } else {
    // --- Not connected: show pair overlay ---
    sendBtn.disabled = true;
    if (appState === "reconnect-failed") {
      setStatusUI("disconnected", "连接失败");
      showError("连接失败", "无法连接到服务器，请检查网络后重试");
    } else if (appState === "reconnecting") {
      setStatusUI("connecting", "连接中...");
      // Show pair overlay with connecting hint, background reconnects
      showPairInput();
    } else if (appState === "paired-waiting") {
      setStatusUI("disconnected", "等待电脑连接");
      showPairInput();
    } else {
      // unpaired
      setStatusUI("disconnected", "未连接");
      showPairInput();
    }
  }
}

function setStatusUI(state, labelText) {
  statusDot.className = "status-dot " + state;
  statusLabel.className = "status-label " + state;
  // Always show label — connected shows subdued text
  if (state === "connected") {
    statusLabel.textContent = "已连接";
  } else {
    statusLabel.textContent = labelText;
  }
  // Update aria
  const ariaMap = { connected: "已连接到电脑", disconnected: "未连接", connecting: "连接中" };
  document.getElementById("statusDotBtn").setAttribute("aria-label", "连接状态：" + (ariaMap[state] || labelText));
  // Update popover content
  popoverDot.className = "status-popover-dot " + (state === "connected" ? "on" : "off");
  const popoverTextMap = {
    connected: "已连接到电脑",
    disconnected: "未连接",
    connecting: "连接中...",
  };
  popoverText.textContent = popoverTextMap[state] || labelText;
}

function setState(newState) {
  appState = newState;
  render();
}

// --- Status dot popover ---

function togglePopover() {
  const isOpen = statusPopover.classList.contains("show");
  if (isOpen) {
    closePopover();
  } else {
    statusPopover.classList.add("show");
    popoverBackdrop.classList.add("show");
  }
}

function closePopover() {
  statusPopover.classList.remove("show");
  popoverBackdrop.classList.remove("show");
}

document.getElementById("statusDotBtn").addEventListener("click", togglePopover);
popoverBackdrop.addEventListener("click", closePopover);

// --- Pair overlay ---

function showPairInput() {
  const wasShown = pairOverlay.classList.contains("show");
  pairOverlay.classList.add("show");
  errorOverlay.classList.remove("show");
  // Show reconnect hint if we have stored credentials (background reconnecting)
  const hint = document.getElementById("pairReconnectHint");
  hint.style.display = (roomId && pairSecret) ? "block" : "none";
  // Only auto-focus on first show, not on every render (avoid interrupting typing)
  if (!wasShown) {
    setTimeout(() => document.getElementById("codeInput").focus(), 100);
  }
}

function hidePairOverlay() {
  pairOverlay.classList.remove("show");
  // Reset submit button state
  const btn = document.getElementById("codeSubmit");
  btn.textContent = "配对";
  btn.style.background = "";
  btn.disabled = false;
}

// submitCode already calls cleanup() + replaces credentials,
// so no separate "clear" button needed

if (!roomId || !pairSecret) {
  showPairInput();
}

let isSubmitting = false;
document.getElementById("codeSubmit").addEventListener("click", submitCode);
document.getElementById("codeInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") submitCode();
});

async function submitCode() {
  if (isSubmitting) return; // Prevent double-submit (code is one-time use)
  const code = document.getElementById("codeInput").value.trim();
  const errorEl = document.getElementById("codeError");
  if (code.length !== 6) { errorEl.textContent = "请输入 6 位数字"; return; }

  isSubmitting = true;
  errorEl.textContent = "";
  document.getElementById("codeSubmit").disabled = true;
  document.getElementById("codeSubmit").textContent = "配对中...";

  try {
    const res = await fetch(HTTP_BASE + "/api/pair-code/lookup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code }),
    });
    const data = await res.json();

    if (!res.ok) {
      const msgs = { INVALID_CODE: "配对码无效，请重新输入", TOO_MANY_ATTEMPTS: "尝试次数过多，请稍后再试" };
      errorEl.textContent = msgs[data.error] || "配对失败";
      document.getElementById("codeSubmit").textContent = "配对";
      document.getElementById("codeSubmit").disabled = false;
      document.getElementById("codeInput").value = "";
      document.getElementById("codeInput").focus();
      isSubmitting = false;
      return;
    }

    // Success — kill old WS, store new credentials, connect immediately
    cleanup();

    roomId = data.roomId;
    pairSecret = data.pairSecret;
    localStorage.setItem("sinput_room_id", roomId);
    localStorage.setItem("sinput_pair_secret", pairSecret);

    // Don't show fake "已连接" — let WS status determine UI
    document.getElementById("codeSubmit").textContent = "连接中...";
    document.getElementById("codeInput").value = "";
    isSubmitting = false;

    // Connect immediately, no artificial delay
    connect();
  } catch {
    errorEl.textContent = "网络错误，请重试";
    document.getElementById("codeSubmit").textContent = "配对";
    document.getElementById("codeSubmit").disabled = false;
    isSubmitting = false;
  }
}

// --- WebSocket ---
function cleanup() {
  stopHeartbeat();
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  if (ws) {
    ws.onopen = ws.onmessage = ws.onclose = ws.onerror = null;
    if (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING) ws.close();
    ws = null;
  }
}

function connect() {
  if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;
  cleanup();
  setState("reconnecting");

  const socket = new WebSocket(API_BASE + `/api/room/${roomId}/ws`);
  ws = socket;

  socket.onopen = () => {
    if (ws !== socket) return;
    socket.send(JSON.stringify({ type: "auth", pairSecret, deviceId, role: "phone" }));
    reconnectAttempt = 0;
    startHeartbeat();
  };

  socket.onmessage = (e) => {
    if (ws !== socket) return;
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    switch (msg.type) {
      case "status":
        desktopOnline = msg.desktopOnline;
        if (desktopOnline) {
          setState("paired-connected");
          showA2HSGuide();
        } else {
          setState("paired-waiting");
        }
        break;
      case "ack":
        showAck();
        break;
      case "error":
        if (["AUTH_FAILED","TOKEN_EXPIRED","TOKEN_CONSUMED","ROOM_DESTROYED"].includes(msg.code)) {
          localStorage.removeItem("sinput_room_id");
          localStorage.removeItem("sinput_pair_secret");
          roomId = null;
          pairSecret = null;
          setState("unpaired");
          showPairInput();
        }
        break;
    }
  };

  socket.onclose = (e) => {
    if (ws !== socket) return;
    ws = null;
    stopHeartbeat();
    if (e.code >= 4001 && e.code <= 4007) return;
    sendBtn.disabled = true;
    scheduleReconnect();
  };

  socket.onerror = () => {};
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  reconnectAttempt++;

  if (reconnectAttempt > MAX_RECONNECT) {
    setState("reconnect-failed");
    return;
  }

  setState("reconnecting");
  const delay = Math.min(2000 * Math.pow(1.5, reconnectAttempt - 1), 15000);
  reconnectTimer = setTimeout(() => { reconnectTimer = null; connect(); }, delay);
}

function startHeartbeat() {
  stopHeartbeat();
  heartbeatTimer = setInterval(() => {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "ping" }));
  }, 30000);
}
function stopHeartbeat() {
  if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; }
}

// --- Send with button-ack feedback ---
function send() {
  const text = textInput.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN || !desktopOnline) return;
  ws.send(JSON.stringify({ type: "text", text, ts: Date.now() }));
  textInput.value = "";
  textInput.style.height = '';
  textInput.focus();
}

sendBtn.addEventListener("click", send);

// Double-click confirm unpair (inside popover)
unpairBtn.addEventListener("click", () => {
  if (unpairConfirmTimer) {
    clearTimeout(unpairConfirmTimer);
    unpairConfirmTimer = null;
    unpairBtn.textContent = "断开配对";
    unpairBtn.classList.remove("confirm");
    closePopover();
    cleanup();
    localStorage.removeItem("sinput_room_id");
    localStorage.removeItem("sinput_pair_secret");
    roomId = null;
    pairSecret = null;
    desktopOnline = false;
    setState("unpaired");
    showPairInput();
    return;
  }
  unpairBtn.textContent = "确认断开?";
  unpairBtn.classList.add("confirm");
  unpairConfirmTimer = setTimeout(() => {
    unpairConfirmTimer = null;
    unpairBtn.textContent = "断开配对";
    unpairBtn.classList.remove("confirm");
  }, 2000);
});

textInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

// Auto-grow: only expand beyond flex-allocated height when content overflows
textInput.addEventListener("input", () => {
  // Reset to let flex determine natural height
  textInput.style.height = '';
  // If content exceeds flex-allocated height, scrollbar handles it (overflow-y: auto)
});

// --- Ack: feedback on send button ---
function showAck() {
  // Haptic feedback (Android; iOS silently ignores)
  if (navigator.vibrate) navigator.vibrate(50);

  const originalText = sendBtn.textContent;
  if (isFirstSend) {
    sendBtn.textContent = "✨ 已到达电脑光标";
    isFirstSend = false;
    localStorage.setItem("sinput_first_send_done", "1");
  } else {
    sendBtn.textContent = "✓";
  }
  sendBtn.classList.add("ack");

  setTimeout(() => {
    sendBtn.textContent = "发送";
    sendBtn.classList.remove("ack");
  }, 700);
}

function showError(title, msg) {
  document.getElementById("errorTitle").textContent = title;
  document.getElementById("errorMsg").textContent = msg;
  errorOverlay.classList.add("show");
}

document.getElementById("errorRetryBtn").addEventListener("click", () => {
  errorOverlay.classList.remove("show");
  reconnectAttempt = 0;
  if (roomId && pairSecret) {
    connect();
  } else {
    showPairInput();
  }
});

// --- A2HS ---
function showA2HSGuide() {
  if (localStorage.getItem("sinput_a2hs_dismissed")) return;
  if (window.matchMedia("(display-mode: standalone)").matches || navigator.standalone) return;

  const ua = navigator.userAgent;
  let steps = "";

  const isWeChat = /MicroMessenger/i.test(ua);
  const isAlipay = /AlipayClient/i.test(ua);
  const isIOS = /iPhone|iPad/i.test(ua);
  const isSafari = isIOS && /Safari/i.test(ua) && !/CriOS|FxiOS/.test(ua) && !isWeChat && !isAlipay;
  const isChromeIOS = /CriOS/i.test(ua);
  const isAndroid = /Android/i.test(ua);

  if (isWeChat || isAlipay) {
    const appName = isWeChat ? "微信" : "支付宝";
    steps = `
      <b>当前在${appName}内，无法直接添加</b><br><br>
      <b>1.</b> 点击右上角 <b>⋯</b><br>
      <b>2.</b> 选择 <b>「在Safari中打开」</b>或<b>「在浏览器打开」</b><br>
      <b>3.</b> 在 Safari 中点击底部 <b>分享 ↑</b><br>
      <b>4.</b> 选择 <b>「添加到主屏幕」</b><br>
      <br><span style="color:var(--text2);font-size:12px">从主屏幕打开后将以独立 App 形式运行</span>
    `;
  } else if (isSafari) {
    steps = `
      <b>1.</b> 点击底部 <b>分享</b>按钮 <b>↑</b><br>
      <b>2.</b> 向下滑动，选择 <b>「添加到主屏幕」</b><br>
      <br><span style="color:var(--text2);font-size:12px">添加后将以独立 App 形式运行</span>
    `;
  } else if (isChromeIOS) {
    steps = `
      <b>1.</b> 点击右下角 <b>分享</b>按钮<br>
      <b>2.</b> 选择 <b>「添加到主屏幕」</b><br>
      <br><span style="color:var(--text2);font-size:12px">添加后将以独立 App 形式运行</span>
    `;
  } else if (isAndroid) {
    steps = `
      <b>1.</b> 点击右上角 <b>⋮</b> 菜单<br>
      <b>2.</b> 选择 <b>「添加到主屏幕」</b>或<b>「安装应用」</b><br>
      <br><span style="color:var(--text2);font-size:12px">安装后将以独立 App 形式运行</span>
    `;
  } else {
    steps = `
      <b>1.</b> 用手机 Safari 或 Chrome 打开此页面<br>
      <b>2.</b> 使用浏览器的「添加到主屏幕」功能<br>
      <br><span style="color:var(--text2);font-size:12px">添加后将以独立 App 形式运行</span>
    `;
  }

  document.getElementById("a2hsSteps").innerHTML = steps;
  document.getElementById("a2hsOverlay").classList.add("show");
}

document.getElementById("a2hsOk").addEventListener("click", () => {
  document.getElementById("a2hsOverlay").classList.remove("show");
  localStorage.setItem("sinput_a2hs_dismissed", "1");
});
document.getElementById("a2hsLater").addEventListener("click", () => {
  document.getElementById("a2hsOverlay").classList.remove("show");
});

// --- Reconnect on visibility ---
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && roomId && pairSecret) {
    if (!ws || ws.readyState === WebSocket.CLOSED) {
      reconnectAttempt = 0;
      connect();
    }
  }
});

// --- Keyboard handling ---
if (window.visualViewport) {
  const app = document.querySelector(".app");
  function onViewportResize() {
    app.style.height = window.visualViewport.height + "px";
  }
  window.visualViewport.addEventListener("resize", onViewportResize);
  window.visualViewport.addEventListener("scroll", onViewportResize);
  onViewportResize();
}

// --- Service Worker ---
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js").catch(() => {});
}

// --- Init ---
if (roomId && pairSecret) {
  connect();
  setTimeout(() => textInput.focus(), 500);
}
</script>
</body>
</html>
